name: Update Banning Register CSVs

on:
  schedule:
    # 1am UTC on the 1st of each month = 11am AEST
    - cron: '0 1 1 * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

jobs:
  update-registers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ACQSC Aged Care register
        id: acqsc
        continue-on-error: true
        run: |
          # Known stable URL for the ACQSC banning register CSV
          ACQSC_URL="https://www.agedcarequality.gov.au/sites/default/files/media/register-banning-orders-data-file.csv"

          echo "Downloading ACQSC CSV from: $ACQSC_URL"
          curl -sL --fail --retry 3 --retry-delay 5 --http1.1 \
            -H "User-Agent: Mozilla/5.0 (compatible; register-updater/1.0)" \
            "$ACQSC_URL" -o aged-care-register.csv

          LINES=$(wc -l < aged-care-register.csv)
          echo "ACQSC CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::ACQSC CSV appears invalid ($LINES lines) — may be an error page"
            cat aged-care-register.csv
            exit 1
          fi

      - name: Fetch NDIS Commission register
        id: ndis
        continue-on-error: true
        run: |
          NDIS_URL="https://www.ndiscommission.gov.au/about-us/compliance-and-enforcement/compliance-actions/search/download-csv"

          echo "Downloading NDIS CSV from: $NDIS_URL"
          curl -sL --fail --retry 3 --retry-delay 5 --http1.1 \
            -H "User-Agent: Mozilla/5.0 (compatible; register-updater/1.0)" \
            "$NDIS_URL" -o ndis-register.csv

          LINES=$(wc -l < ndis-register.csv)
          echo "NDIS CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::NDIS CSV appears invalid ($LINES lines) — may be an error page"
            cat ndis-register.csv
            exit 1
          fi

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add whichever files exist (the other fetch may have failed)
          git add aged-care-register.csv 2>/dev/null || true
          git add ndis-register.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit — registers are already up to date"
          else
            git commit -m "Auto-update: register CSVs $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail if any fetch failed
        if: steps.acqsc.outcome == 'failure' || steps.ndis.outcome == 'failure'
        run: |
          echo "::error::One or more register fetches failed. Check the steps above for details."
          exit 1
