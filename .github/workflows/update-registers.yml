name: Update Banning Register CSVs

on:
  schedule:
    # 1am UTC on the 1st of each month = 11am AEST
    - cron: '0 1 1 * *'
  workflow_dispatch:

jobs:
  update-registers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify API key secret is configured
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Repository secret SCRAPINGBEE_API_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Detect whitespace in the secret (common paste issue)
          RAW_LEN=$(printf '%s' "$KEY" | wc -c)
          TRIM_LEN=$(printf '%s' "$KEY" | tr -d '[:space:]' | wc -c)
          echo "API key length raw=$RAW_LEN trimmed=$TRIM_LEN"
          if [ "$RAW_LEN" != "$TRIM_LEN" ]; then
            echo "::warning::API key contains whitespace ($((RAW_LEN-TRIM_LEN)) chars). Workflow will strip it, but please re-save the secret without leading/trailing whitespace."
          fi

      - name: Fetch ACQSC Aged Care register
        id: acqsc
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          # Trim any stray whitespace from the secret (defensive)
          KEY=$(printf '%s' "$KEY" | tr -d '[:space:]')

          URL="https://www.agedcarequality.gov.au/sites/default/files/media/register-banning-orders-data-file.csv"
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$URL")
          echo "Target URL: $URL"
          echo "Encoded length: ${#ENC}"

          # Build URL using --data-urlencode for safety; -G converts to GET querystring
          set +e
          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o aged-care-register.csv \
            -G "https://app.scrapingbee.com/api/v1/" \
            --data-urlencode "api_key=${KEY}" \
            --data-urlencode "url=${URL}" \
            --data-urlencode "stealth_proxy=true")
          CURL_EXIT=$?
          set -e

          echo "curl exit: $CURL_EXIT"
          echo "ScrapingBee HTTP: $HTTP_CODE"
          if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ScrapingBee request failed (curl=$CURL_EXIT, HTTP=$HTTP_CODE) for ACQSC"
            echo "--- Response preview ---"
            head -c 1500 aged-care-register.csv || true
            exit 1
          fi

          LINES=$(wc -l < aged-care-register.csv)
          echo "ACQSC CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::ACQSC CSV looks invalid ($LINES lines)"
            head -c 1500 aged-care-register.csv
            exit 1
          fi

      - name: Fetch NDIS Commission register
        id: ndis
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          KEY=$(printf '%s' "$KEY" | tr -d '[:space:]')

          URL="https://www.ndiscommission.gov.au/about-us/compliance-and-enforcement/compliance-actions/search/download-csv"
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$URL")
          echo "Target URL: $URL"
          echo "Encoded length: ${#ENC}"

          set +e
          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o ndis-register.csv \
            -G "https://app.scrapingbee.com/api/v1/" \
            --data-urlencode "api_key=${KEY}" \
            --data-urlencode "url=${URL}" \
            --data-urlencode "stealth_proxy=true")
          CURL_EXIT=$?
          set -e

          echo "curl exit: $CURL_EXIT"
          echo "ScrapingBee HTTP: $HTTP_CODE"
          if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ScrapingBee request failed (curl=$CURL_EXIT, HTTP=$HTTP_CODE) for NDIS"
            echo "--- Response preview ---"
            head -c 1500 ndis-register.csv || true
            exit 1
          fi

          LINES=$(wc -l < ndis-register.csv)
          echo "NDIS CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::NDIS CSV looks invalid ($LINES lines)"
            head -c 1500 ndis-register.csv
            exit 1
          fi

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aged-care-register.csv ndis-register.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit — registers are already up to date"
          else
            git commit -m "Auto-update: register CSVs $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail if any fetch failed
        if: steps.acqsc.outcome == 'failure' || steps.ndis.outcome == 'failure'
        run: |
          echo "::error::One or more register fetches failed. Check the steps above for details."
          exit 1
