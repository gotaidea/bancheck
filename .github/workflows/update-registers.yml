name: Update Banning Register CSVs

on:
  schedule:
    # 1am UTC on the 1st of each month = 11am AEST
    - cron: '0 1 1 * *'
  workflow_dispatch:

jobs:
  update-registers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify API key secret is configured
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Repository secret SCRAPINGBEE_API_KEY is not set."
            exit 1
          fi
          RAW_LEN=$(printf '%s' "$KEY" | wc -c)
          TRIM_LEN=$(printf '%s' "$KEY" | tr -d '[:space:]' | wc -c)
          echo "API key length raw=$RAW_LEN trimmed=$TRIM_LEN"
          if [ "$RAW_LEN" != "$TRIM_LEN" ]; then
            echo "::warning::API key has $((RAW_LEN-TRIM_LEN)) whitespace char(s). Workflow will strip; consider re-saving the secret cleanly."
          fi

      - name: Fetch ACQSC Aged Care register
        id: acqsc
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          KEY=$(printf '%s' "$KEY" | tr -d '[:space:]')
          URL="https://www.agedcarequality.gov.au/sites/default/files/media/register-banning-orders-data-file.csv"
          TMP=$(mktemp)

          # render_js=false: don't try to render a CSV as HTML
          # premium_proxy=true: residential IPs (gov sites block datacenter)
          set +e
          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o "$TMP" \
            -G "https://app.scrapingbee.com/api/v1/" \
            --data-urlencode "api_key=${KEY}" \
            --data-urlencode "url=${URL}" \
            --data-urlencode "render_js=false" \
            --data-urlencode "premium_proxy=true")
          CURL_EXIT=$?
          set -e

          echo "curl exit: $CURL_EXIT, HTTP: $HTTP_CODE, bytes: $(wc -c < "$TMP")"

          if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ACQSC fetch failed (curl=$CURL_EXIT, HTTP=$HTTP_CODE)"
            echo "--- Response preview ---"
            head -c 1500 "$TMP" || true
            rm -f "$TMP"
            exit 1
          fi

          # Reject obvious non-CSV (JSON error, HTML error page)
          FIRST=$(head -c 1 "$TMP")
          if [ "$FIRST" = "{" ] || [ "$FIRST" = "<" ]; then
            echo "::error::ACQSC response is not CSV (first byte: '$FIRST')"
            head -c 1500 "$TMP"
            rm -f "$TMP"
            exit 1
          fi

          LINES=$(wc -l < "$TMP")
          if [ "$LINES" -lt 5 ]; then
            echo "::error::ACQSC CSV too small ($LINES lines)"
            head -c 1500 "$TMP"
            rm -f "$TMP"
            exit 1
          fi

          mv "$TMP" aged-care-register.csv
          echo "ACQSC CSV saved: $LINES lines"

      - name: Fetch NDIS Commission register
        id: ndis
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          KEY=$(printf '%s' "$KEY" | tr -d '[:space:]')
          URL="https://www.ndiscommission.gov.au/about-us/compliance-and-enforcement/compliance-actions/search/download-csv"
          TMP=$(mktemp)

          set +e
          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o "$TMP" \
            -G "https://app.scrapingbee.com/api/v1/" \
            --data-urlencode "api_key=${KEY}" \
            --data-urlencode "url=${URL}" \
            --data-urlencode "render_js=false" \
            --data-urlencode "premium_proxy=true")
          CURL_EXIT=$?
          set -e

          echo "curl exit: $CURL_EXIT, HTTP: $HTTP_CODE, bytes: $(wc -c < "$TMP")"

          if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
            echo "::error::NDIS fetch failed (curl=$CURL_EXIT, HTTP=$HTTP_CODE)"
            echo "--- Response preview ---"
            head -c 1500 "$TMP" || true
            rm -f "$TMP"
            exit 1
          fi

          FIRST=$(head -c 1 "$TMP")
          if [ "$FIRST" = "{" ] || [ "$FIRST" = "<" ]; then
            echo "::error::NDIS response is not CSV (first byte: '$FIRST')"
            head -c 1500 "$TMP"
            rm -f "$TMP"
            exit 1
          fi

          LINES=$(wc -l < "$TMP")
          if [ "$LINES" -lt 5 ]; then
            echo "::error::NDIS CSV too small ($LINES lines)"
            head -c 1500 "$TMP"
            rm -f "$TMP"
            exit 1
          fi

          mv "$TMP" ndis-register.csv
          echo "NDIS CSV saved: $LINES lines"

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aged-care-register.csv ndis-register.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: register CSVs $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail if any fetch failed
        if: steps.acqsc.outcome == 'failure' || steps.ndis.outcome == 'failure'
        run: |
          echo "::error::One or more register fetches failed. Check the steps above."
          exit 1
