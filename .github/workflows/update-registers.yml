name: Update Banning Register CSVs

on:
  schedule:
    # 1am UTC on the 1st of each month = 11am AEST
    - cron: '0 1 1 * *'
  workflow_dispatch:

jobs:
  update-registers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify API key secret is configured
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Repository secret SCRAPINGBEE_API_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Fetch ACQSC Aged Care register
        id: acqsc
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          URL="https://www.agedcarequality.gov.au/sites/default/files/media/register-banning-orders-data-file.csv"
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$URL")

          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o aged-care-register.csv \
            "https://app.scrapingbee.com/api/v1/?api_key=${KEY}&url=${ENC}&premium_proxy=true&country_code=au")

          echo "ScrapingBee HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ScrapingBee returned HTTP $HTTP_CODE for ACQSC"
            echo "--- Response preview ---"
            head -c 800 aged-care-register.csv
            exit 1
          fi

          LINES=$(wc -l < aged-care-register.csv)
          echo "ACQSC CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::ACQSC CSV looks invalid ($LINES lines)"
            head -c 800 aged-care-register.csv
            exit 1
          fi

      - name: Fetch NDIS Commission register
        id: ndis
        continue-on-error: true
        env:
          KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: |
          URL="https://www.ndiscommission.gov.au/about-us/compliance-and-enforcement/compliance-actions/search/download-csv"
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$URL")

          HTTP_CODE=$(curl -sS -L --max-time 180 -w "%{http_code}" \
            -o ndis-register.csv \
            "https://app.scrapingbee.com/api/v1/?api_key=${KEY}&url=${ENC}&premium_proxy=true&country_code=au")

          echo "ScrapingBee HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ScrapingBee returned HTTP $HTTP_CODE for NDIS"
            echo "--- Response preview ---"
            head -c 800 ndis-register.csv
            exit 1
          fi

          LINES=$(wc -l < ndis-register.csv)
          echo "NDIS CSV: $LINES lines"
          if [ "$LINES" -lt 5 ]; then
            echo "::error::NDIS CSV looks invalid ($LINES lines)"
            head -c 800 ndis-register.csv
            exit 1
          fi

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aged-care-register.csv ndis-register.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit — registers are already up to date"
          else
            git commit -m "Auto-update: register CSVs $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail if any fetch failed
        if: steps.acqsc.outcome == 'failure' || steps.ndis.outcome == 'failure'
        run: |
          echo "::error::One or more register fetches failed. Check the steps above for details."
          exit 1
