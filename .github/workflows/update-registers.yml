name: Update Banning Register CSVs

on:
  schedule:
    # 1am UTC on the 1st of each month = 11am AEST
    - cron: '0 1 1 * *'
  workflow_dispatch:

jobs:
  update-registers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ACQSC Aged Care register
        id: acqsc
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, sys

          url = "https://www.agedcarequality.gov.au/sites/default/files/media/register-banning-orders-data-file.csv"
          enc = urllib.parse.quote(url, safe='')

          attempts = [
              ("direct",        url),
              ("allorigins",    f"https://api.allorigins.win/raw?url={enc}"),
              ("corsproxy.io",  f"https://corsproxy.io/?{enc}"),
              ("codetabs",      f"https://api.codetabs.com/v1/proxy?quest={enc}"),
          ]

          for name, fetch_url in attempts:
              print(f"Trying {name}...")
              try:
                  req = urllib.request.Request(fetch_url, headers={
                      "User-Agent": "Mozilla/5.0 (compatible; register-updater/1.0)"
                  })
                  with urllib.request.urlopen(req, timeout=45) as resp:
                      data = resp.read()
                  lines = data.count(b"\n")
                  if lines >= 4:
                      with open("aged-care-register.csv", "wb") as f:
                          f.write(data)
                      print(f"OK via {name}: {lines} lines")
                      sys.exit(0)
                  print(f"{name} returned only {lines} lines — skipping")
              except Exception as e:
                  print(f"{name} failed: {e}")

          print("All attempts failed for ACQSC register", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Fetch NDIS Commission register
        id: ndis
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, sys

          url = "https://www.ndiscommission.gov.au/about-us/compliance-and-enforcement/compliance-actions/search/download-csv"
          enc = urllib.parse.quote(url, safe='')

          attempts = [
              ("direct",        url),
              ("allorigins",    f"https://api.allorigins.win/raw?url={enc}"),
              ("corsproxy.io",  f"https://corsproxy.io/?{enc}"),
              ("codetabs",      f"https://api.codetabs.com/v1/proxy?quest={enc}"),
          ]

          for name, fetch_url in attempts:
              print(f"Trying {name}...")
              try:
                  req = urllib.request.Request(fetch_url, headers={
                      "User-Agent": "Mozilla/5.0 (compatible; register-updater/1.0)"
                  })
                  with urllib.request.urlopen(req, timeout=45) as resp:
                      data = resp.read()
                  lines = data.count(b"\n")
                  if lines >= 4:
                      with open("ndis-register.csv", "wb") as f:
                          f.write(data)
                      print(f"OK via {name}: {lines} lines")
                      sys.exit(0)
                  print(f"{name} returned only {lines} lines — skipping")
              except Exception as e:
                  print(f"{name} failed: {e}")

          print("All attempts failed for NDIS register", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aged-care-register.csv ndis-register.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit — registers are already up to date"
          else
            git commit -m "Auto-update: register CSVs $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail if any fetch failed
        if: steps.acqsc.outcome == 'failure' || steps.ndis.outcome == 'failure'
        run: |
          echo "::error::One or more register fetches failed. Check the steps above for details."
          exit 1
